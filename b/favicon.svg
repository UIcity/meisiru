<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <title>メイシル favicon（案B シンボル流用）</title>
  <desc>生成り地の正方形に、金茶の落款フレームと墨紺の「メ」意匠を置いたシンボル単体のfaviconです。</desc>
  <!-- 背景（生成り） -->
  <rect width="64" height="64" rx="8" fill="#F5F1E8"/>
  <!-- 落款フレーム（金茶） -->
  <rect x="8" y="8" width="48" height="48" rx="2.4" fill="none" stroke="#B8935A" stroke-width="5.2"/>
  <!-- 「メ」意匠（墨紺） -->
  <g fill="none" stroke="#1A2633" stroke-width="8" stroke-linecap="round">
    <path d="M42.4 16 Q33.6 33.2 19.2 48.4"/>
    <path d="M22 27.6 L45.2 48.4"/>
  </g>
</svg>
